<!DOCTYPE html>
<!-- Source template for og-image.png (rendered at 1200x630). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1200px;
        height: 630px;
        background: #f5f3ec;
        color: #171511;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 64px 72px 56px;
        overflow: hidden;
        position: relative;
      }
      .rule {
        position: absolute;
        left: 72px;
        right: 72px;
        height: 1px;
        background: #171511;
      }
      .rule.top {
        top: 132px;
      }
      .kicker {
        font-family: "IBM Plex Mono", monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #807b6f;
      }
      .name {
        font-family: "Instrument Serif", serif;
        font-size: 150px;
        line-height: 0.95;
        letter-spacing: -0.02em;
      }
      .name em {
        font-style: italic;
        color: #2438e8;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-top: 1px solid #b9b4a3;
        padding-top: 28px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 21px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #45423a;
      }
      .footer .url {
        color: #2438e8;
      }
    </style>
  </head>
  <body>
    <div class="kicker">AI Research Engineer · Upstage · Seoul</div>
    <div class="rule top"></div>
    <div class="name">Dongjun&nbsp;<em>Kim</em></div>
    <div class="footer">
      <span>LLM Evaluation · Interpretability · Safety</span>
      <span class="url">junkim100.github.io</span>
    </div>
  </body>
</html>
